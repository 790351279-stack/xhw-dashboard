function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
}

// delta标签生成
function dl(v, isBad) {
  if (v === 0) return '<span class="delta zero">+0</span>';
  const prefix = v > 0 ? '+' : '';
  if (isBad && v > 0) return '<span class="delta bad">' + prefix + v + '</span>';
  if (v < 0) return '<span class="delta bad">' + v + '</span>';
  return '<span class="delta pos">' + prefix + v + '</span>';
}
// 百分点delta
function dlPct(v) {
  if (v === 0) return '<span class="delta zero">+0pp</span>';
  const prefix = v > 0 ? '+' : '';
  if (v > 0) return '<span class="delta good">' + prefix + v.toFixed(1) + 'pp</span>';
  return '<span class="delta bad">' + v.toFixed(1) + 'pp</span>';
}

// 自动算增量：当前 - 上次
function calcDelta(cur, prev, keys) {
  const d = {};
  keys.forEach(k => { d['d'+k] = (cur[k]||0) - (prev[k]||0); });
  return d;
}

  const cur = CUR_SNAPSHOT.ly[team];
  const prev = PREV_SNAPSHOT.ly[team];
  if (Array.isArray(cur)) {
    LY_DATA[team] = cur.map(c => {
      const p = prev ? prev.find(x => x.name === c.name) : null;
      const d = p ? calcDelta(c, p, ['iz','ib','rz','rb','sz','sb']) : {diz:0,dib:0,drz:0,drb:0,dsz:0,dsb:0};
      return {...c, ...d};
    });
  } else {
    const d = prev ? calcDelta(cur, prev, ['iz','ib','rz','rb','sz','sb']) : {diz:0,dib:0,drz:0,drb:0,dsz:0,dsb:0};
    LY_DATA[team] = {...cur, ...d};
  }
});

];

function calcPerson(name) {
  const t00 = T00[name] || null;
  const t88 = T88[name] || null;
  const t159 = T159[name] || null;
  let cp00 = t00 ? t00.cp : 0, s1000 = t00 ? t00.s10 : 0, my00 = t00 ? t00.my : 0;
  let cp88 = t88 ? t88.cp : 0, s1088 = t88 ? t88.s10 : 0;
  let cp159 = t159 ? t159.cp : 0, s10159 = t159 ? t159.s10 : 0, my159 = t159 ? (t159.my||0) : 0;
  // deltas
  let dcp00 = t00 ? t00.dcp : 0, ds1000 = t00 ? t00.ds10 : 0, dmy00 = t00 ? t00.dmy : 0;
  let dcp88 = t88 ? t88.dcp : 0, ds1088 = t88 ? t88.ds10 : 0;
  let dcp159 = t159 ? t159.dcp : 0, ds10159 = t159 ? t159.ds10 : 0, dmy159 = t159 ? (t159.dmy||0) : 0;

  let totalCp = cp00 + cp88 + cp159, totalS10 = s1000 + s1088 + s10159, totalMy = my00 + my159;
  let dtotalCp = dcp00 + dcp88 + dcp159, dtotalS10 = ds1000 + ds1088 + ds10159, dtotalMy = dmy00 + dmy159;
  let combinedRate = totalCp > 0 ? (totalS10 / totalCp * 100).toFixed(2) + '%' : '-';
  // rate delta
  let prevCp = totalCp - dtotalCp, prevS10 = totalS10 - dtotalS10;
  let rateDelta = (totalCp > 0 && prevCp > 0) ? (totalS10/totalCp*100 - prevS10/prevCp*100) : 0;

  return { t00, t88, t159, totalCp, totalS10, combinedRate, totalMy, dtotalCp, dtotalS10, dtotalMy, rateDelta };
}

(function buildCF() {
  // 按班组分组
  const teamGroups = {};
  const personCount = {};
  CF_DATA.forEach(d => {
    if (!teamGroups[d.team]) teamGroups[d.team] = [];
    teamGroups[d.team].push(d);
    personCount[d.firstPerson] = (personCount[d.firstPerson] || 0) + 1;
  });

  // 汇总卡片
  const totalCases = CF_DATA.length;
  const totalRepeat = CF_DATA.reduce((s, d) => s + d.repeatCount, 0);
  const persons = Object.keys(personCount);
  const topPerson = persons.sort((a, b) => personCount[b] - personCount[a])[0];
  const topCount = personCount[topPerson];

  document.getElementById('sum-cf').innerHTML = `
    <div class="s-card red"><div class="lb">重复故障数</div><div class="vl">${totalCases}<span style="font-size:13px;color:#999">条</span></div></div>
    <div class="s-card orange"><div class="lb">涉及总工单</div><div class="vl">${totalRepeat}<span style="font-size:13px;color:#999">单</span></div></div>
    <div class="s-card blue"><div class="lb">涉及责任人</div><div class="vl">${persons.length}<span style="font-size:13px;color:#999">人</span></div></div>
    <div class="s-card gray"><div class="lb">最多重复</div><div class="vl" style="font-size:18px">${topPerson}<span style="font-size:13px;color:#999">(${topCount}条)</span></div></div>
  `;

  const colors = { '凉伞农村装维': 'c1', '禾滩农村装维': 'c2', '城区装维': 'c3', '支撑人员': 'c4' };
  const box = document.getElementById('teams-cf');

  // 按班组列表展示
  Object.keys(teamGroups).sort().forEach(team => {
    const records = teamGroups[team];
    const c = colors[team] || 'c1';
    // 按责任人统计
    const teamPersonCount = {};
    records.forEach(d => { teamPersonCount[d.firstPerson] = (teamPersonCount[d.firstPerson] || 0) + 1; });
    const teamPersons = Object.keys(teamPersonCount).sort((a, b) => teamPersonCount[b] - teamPersonCount[a]);

    let html = `<div class="team"><div class="team-hd ${c}"><h2>${team}</h2><div class="ts">`;
    html += `重复故障<b class="red">${records.length}</b>条 | 涉及责任人<b class="red">${teamPersons.length}</b>人`;
    html += `</div></div>`;

    // 责任人汇总行
    html += `<div style="padding:8px 16px;background:#fef7f0;border-bottom:1px solid #f0e0d0;font-size:13px">`;
    html += `<b>责任人统计：</b>`;
    teamPersons.forEach((p, i) => {
      const cnt = teamPersonCount[p];
      const cls = cnt >= 2 ? 'color:#ea4335;font-weight:bold' : 'color:#5f6368';
      html += `${i > 0 ? ' | ' : ''}<span style="${cls}">${p}(${cnt}条)</span>`;
    });
    html += `</div>`;

    // 明细表格
    html += `<table><thead><tr>`;
    html += `<th style="text-align:left;padding-left:12px">业务号码</th>`;
    html += `<th>重障日期</th><th>首次报障日期</th><th>首次责任人</th><th>所有经手人</th><th>地址</th><th>回单原因</th><th>重复次数</th>`;
    html += `</tr></thead><tbody>`;

    records.forEach(d => {
      const rc = d.repeatCount >= 3 ? 'warn' : d.repeatCount >= 2 ? 'orange' : '';
      html += `<tr>`;
      html += `<td class="nm" style="max-width:160px;overflow:hidden;text-overflow:ellipsis">${d.account}</td>`;
      html += `<td>${d.date}</td>`;
      html += `<td>${d.firstDate}</td>`;
      html += `<td style="font-weight:bold;color:#ea4335">${d.firstPerson}</td>`;
      html += `<td style="font-size:12px;color:#666">${d.allPersons}</td>`;
      html += `<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;font-size:12px">${d.addr}</td>`;
      html += `<td style="font-size:12px">${d.reason}</td>`;
      html += `<td class="rt ${rc}">${d.repeatCount}</td>`;
      html += `</tr>`;
    });

    html += `</tbody></table></div>`;
    box.innerHTML += html;
  });
})();
