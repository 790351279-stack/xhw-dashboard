<script>
function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
}

// delta标签生成
function dl(v, isBad) {
  if (v === 0) return '<span class="delta zero">+0</span>';
  const prefix = v > 0 ? '+' : '';
  if (isBad && v > 0) return '<span class="delta bad">' + prefix + v + '</span>';
  if (v < 0) return '<span class="delta bad">' + v + '</span>';
  return '<span class="delta pos">' + prefix + v + '</span>';
}
// 百分点delta
function dlPct(v) {
  if (v === 0) return '<span class="delta zero">+0pp</span>';
  const prefix = v > 0 ? '+' : '';
  if (v > 0) return '<span class="delta good">' + prefix + v.toFixed(1) + 'pp</span>';
  return '<span class="delta bad">' + v.toFixed(1) + 'pp</span>';
}

// 自动算增量：当前 - 上次
function calcDelta(cur, prev, keys) {
  const d = {};
  keys.forEach(k => { d['d'+k] = (cur[k]||0) - (prev[k]||0); });
  return d;
}

  if (Array.isArray(cur)) {
    LY_DATA[team] = cur.map(c => {
      const p = prev ? prev.find(x => x.name === c.name) : null;
      const d = p ? calcDelta(c, p, ['iz','ib','rz','rb','sz','sb']) : {diz:0,dib:0,drz:0,drb:0,dsz:0,dsb:0};
      return {...c, ...d};
    });

    const d = prev ? calcDelta(cur, prev, ['iz','ib','rz','rb','sz','sb']) : {diz:0,dib:0,drz:0,drb:0,dsz:0,dsb:0};
    LY_DATA[team] = {...cur, ...d};

});

const GH_REPO = '790351279-stack/xhw-dashboard';
const GH_TOKEN = ['ghp_TsMoTHcMiX','vhrPpQkGNNjwg34HdWO43S88Lr'].join('');
const FB_URL = 'https://api.github.com/repos/' + GH_REPO + '/contents/feedback.json';
let feedbackMap = {}; // account -> [feedbacks]
let currentFbAccount = null;

async function loadFeedback() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/' + GH_REPO + '/main/feedback.json?t=' + Date.now());
    if (!res.ok) { feedbackMap = {}; return; }
    const data = await res.json();
    feedbackMap = {};
    (data.feedbacks || []).forEach(fb => {
      if (!feedbackMap[fb.account]) feedbackMap[fb.account] = [];
      feedbackMap[fb.account].push(fb);
    });
  } catch(e) { feedbackMap = {}; }
}

async function saveFeedback(newFb) {
  // GET current file to get SHA
  let sha = '';
  let existing = {feedbacks:[]};
  try {
    const res = await fetch(FB_URL, { headers: { 'Authorization': 'token ' + GH_TOKEN } });
    if (res.ok) {
      const data = await res.json();
      sha = data.sha;
      existing = JSON.parse(atob(data.content));
    }
  } catch(e) {}
  existing.feedbacks.push(newFb);
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(existing, null, 2))));
  const putRes = await fetch(FB_URL, {
    method: 'PUT',
    headers: { 'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'Add feedback for ' + newFb.account, content: content, sha: sha || undefined })
  });
  return putRes.ok;
}

async function submitFeedback() {
  const cat = document.getElementById('fb-category').value;
  const reason = document.getElementById('fb-reason').value.trim();
  const action = document.getElementById('fb-action').value;
  if (!cat || !action) { alert('请填写定责分类和用户是否保存联系方式'); return; }
  const btn = document.getElementById('fb-submit');
  btn.disabled = true; btn.textContent = '提交中...';
  const fb = {
    account: currentFbAccount,

    reason: reason,
    action: action,
    time: new Date().toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})

  const ok = await saveFeedback(fb);

      if (delta > 0) {
        result.push({
          name: cr.name,
          type: '不履约+' + delta,
          detail: '装机不履约' + (cr.ib - pr.ib > 0 ? '+' + (cr.ib - pr.ib) : '0') + ' 修障不履约' + (cr.rb - pr.rb > 0 ? '+' + (cr.rb - pr.rb) : '0') + ' 支撑不履约' + (cr.sb - pr.sb > 0 ? '+' + (cr.sb - pr.sb) : '0'),
          delta: delta,
          tag: 'red'
        });
      }
    });
    return result;
  }

  // 计算十分满意率异常变动（非十分满意增量）
  function calcMyDelta() {
    const people = cur.my.people;
    // 十分满意率没有prev增量数据，简化处理：标记非十分满意>0的人员
    const result = [];
    people.forEach(p => {
      if (p.t === 3) return; // 支撑人员跳过
      const zwNot10 = p.zw[1] - p.zw[0]; // 装维工单非十分满意数
      if (zwNot10 > 0) {
        const items = [];
        if (p.gz[1] - p.gz[0] > 0) items.push('故障' + (p.gz[1] - p.gz[0]));
        if (p.kz[1] - p.kz[0] > 0) items.push('开通' + (p.kz[1] - p.kz[0]));
        if (p.qtz[1] - p.qtz[0] > 0) items.push('其他装' + (p.qtz[1] - p.qtz[0]));
        if (p.tyy[1] - p.tyy[0] > 0) items.push('云眼' + (p.tyy[1] - p.tyy[0]));
        if (p.zsh[1] - p.zsh[0] > 0) items.push('政企售后' + (p.zsh[1] - p.zsh[0]));
        if (p.zd[1] - p.zd[0] > 0) items.push('主动' + (p.zd[1] - p.zd[0]));
        if (p.zkz[1] - p.zkz[0] > 0) items.push('政企开通' + (p.zkz[1] - p.zkz[0]));
        if (p.bcx[1] - p.bcx[0] > 0) items.push('不满意修复' + (p.bcx[1] - p.bcx[0]));
        result.push({
          name: p.n,
          team: p.t,
          rate: p.r,
          not10: zwNot10,
          items: items
        });
      }
    });
    return result;
  }

  // ========== 渲染汇总卡片 ==========
  const lyDeltas = {};
  TEAM_NAMES_AB.forEach(tn => { lyDeltas[tn] = calcLyDelta(tn); });
  const myDeltas = calcMyDelta();

  const totalLyAbnormal = Object.values(lyDeltas).reduce((s, arr) => s + arr.length, 0);
  const totalMyAbnormal = myDeltas.length;
  const totalRepRate = REP_DATA.length > 0 ? REP_DATA.reduce((s, d) => s + d.cfNoPcdn, 0) : 0;
  const totalGzNoPcdn = REP_DATA.length > 0 ? REP_DATA.reduce((s, d) => s + d.gzNoPcdn, 0) : 0;
  const overallNoPcdnRate = totalGzNoPcdn > 0 ? (totalRepRate / totalGzNoPcdn * 100).toFixed(2) + '%' : '-';

  document.getElementById('sum-ab').innerHTML = `
    <div class="s-card red"><div class="lb">昨日不履约变动</div><div class="vl">${totalLyAbnormal}<span style="font-size:13px;color:#999">人</span></div></div>
    <div class="s-card orange"><div class="lb">非十分满意</div><div class="vl">${totalMyAbnormal}<span style="font-size:13px;color:#999">人</span></div></div>
    <div class="s-card blue"><div class="lb">90天不含PCDN<br>重复故障率</div><div class="vl" style="font-size:22px">${overallNoPcdnRate}</div></div>
    <div class="s-card gray"><div class="lb">重复故障人数</div><div class="vl">${REP_DATA.filter(d => d.cfNoPcdn > 0).length}<span style="font-size:13px;color:#999">人</span></div></div>
  `;

  const box = document.getElementById('teams-ab');

  // ========== Section 1: 昨日异常工单变动表 ==========
  let html = `<div class="ab-section">`;
  html += `<div class="ab-section-hd">昨日异常工单变动 <span class="ab-tag red">不履约增量</span> <span class="ab-tag orange">非十分满意</span></div>`;

  // 不履约增量
  const allLyItems = [];
  TEAM_NAMES_AB.forEach((tn, ti) => {
    lyDeltas[tn].forEach(d => {
      allLyItems.push({ ...d, team: tn, teamIdx: ti });
    });
  });

  if (allLyItems.length > 0) {
    html += `<div style="padding:8px 16px;background:#fff5f5;border-bottom:1px solid #f0e0d0;font-size:13px"><b style="color:#ea4335">不履约增量人员：</b>`;
    allLyItems.forEach((d, i) => {
      html += `${i > 0 ? ' | ' : ''}<span style="color:#ea4335;font-weight:bold">${d.name}(${d.type})</span>`;
    });
    html += `</div>`;
  }

  // 非十分满意人员表格
  html += `<div style="padding:8px 16px;background:#fff8e6;border-bottom:1px solid #f0e0d0;font-size:13px"><b style="color:#f9ab00">非十分满意人员：</b>按装维工单10分满意率排序</div>`;

  html += `<table><thead><tr>`;
  html += `<th style="text-align:left;padding-left:12px">姓名</th>`;
  html += `<th>片区</th><th>满意率</th><th>非十分满意数</th><th>异常类型</th>`;
  html += `</tr></thead><tbody>`;

  // 按满意率从低到高排序
  myDeltas.sort((a, b) => {
    const ra = parseFloat(a.rate) || 100;
    const rb = parseFloat(b.rate) || 100;
    return ra - rb;
  });

  myDeltas.forEach(d => {
    const rateNum = parseFloat(d.rate) || 100;
    const rc = rateNum < 90 ? 'warn' : rateNum < 95 ? 'orange' : '';
    html += `<tr>`;
    html += `<td class="nm">${d.name}</td>`;
    html += `<td style="font-size:12px;color:#5f6368">${TEAM_NAMES_AB[d.team]}</td>`;
    html += `<td class="rt ${rc}">${d.rate}</td>`;
    html += `<td style="color:#ea4335;font-weight:bold">${d.not10}</td>`;
    html += `<td style="font-size:12px">${d.items.map(i => '<span class="ab-tag orange">' + i + '</span>').join(' ')}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;

  // ========== Section 2: 90天不含PCDN重复故障率 ==========
  html += `<div class="ab-section">`;
  html += `<div class="ab-section-hd blue">90天不含PCDN重复故障率 <span class="ab-tag blue">表25049 宽带+IPTV</span></div>`;

  // 只显示有重复故障的人 + 按片区分组
  TEAM_NAMES_AB.forEach((tn, ti) => {
    const members = REP_DATA.filter(d => d.t === ti);
    if (members.length === 0) return;

    const hasCf = members.some(d => d.cfNoPcdn > 0);
    const c = TEAM_COLORS_AB[ti];
    html += `<div class="team"><div class="team-hd ${c}"><h2>${tn}</h2><div class="ts">`;
    const teamGz = members.reduce((s, d) => s + d.gzNoPcdn, 0);
    const teamCf = members.reduce((s, d) => s + d.cfNoPcdn, 0);
    const teamRate = teamGz > 0 ? (teamCf / teamGz * 100).toFixed(2) + '%' : '-';
    html += `不含PCDN竣工<b>${teamGz}</b>户 | 重复<b class="${teamCf > 0 ? 'red' : 'green'}">${teamCf}</b>户 | 不含PCDN重复率<b class="${teamCf > 0 ? 'red' : 'green'}">${teamRate}</b>`;
    html += `</div></div>`;

    html += `<table><thead><tr>`;
    html += `<th style="text-align:left;padding-left:12px">姓名</th>`;
    html += `<th>故障竣工(不含PCDN)</th><th>90天重复用户数</th><th>不含PCDN重复故障率</th><th>故障分布</th>`;
    html += `</tr></thead><tbody>`;

    members.forEach(d => {
      const rateNum = parseFloat(d.noPcdnRate) || 0;
      const rc = rateNum > 0 ? (rateNum >= 50 ? 'warn' : 'orange') : 'ok';
      // 从原始数据计算故障分布
      const dist = [];
      // 使用REP_DATA的扩展信息
      html += `<tr${d.cfNoPcdn > 0 ? ' style="background:#fff5f5"' : ''}>`;
      html += `<td class="nm">${d.n}</td>`;
      html += `<td>${d.gzNoPcdn}</td>`;
      html += `<td style="color:${d.cfNoPcdn > 0 ? '#ea4335' : '#ccc'};font-weight:${d.cfNoPcdn > 0 ? 'bold' : 'normal'}">${d.cfNoPcdn}</td>`;
      // 重复故障率带进度条
      const barW = Math.min(rateNum, 100);
      const barCls = rateNum === 0 ? 'good' : rateNum < 20 ? 'low' : '';
      html += `<td class="rt ${rc}">${d.noPcdnRate} <span class="rate-bar bg"><span class="rate-bar fg ${barCls}" style="width:${barW}%"></span></span></td>`;
      html += `<td style="font-size:12px;color:#5f6368">${d.cfRate === d.noPcdnRate ? '-' : '含PCDN:' + d.cfRate}</td>`;
      html += `</tr>`;
    });

    html += `</tbody></table></div>`;
  });

  html += `</div>`;

  box.innerHTML = html;
})();

// 点击模态框外关闭
document.getElementById('fb-modal').addEventListener('click', function(e) {
  if (e.target === this) closeFbModal();
});

// 页面加载时拉取反馈数据并渲染徽标
loadFeedback().then(() => { renderCfBadges(); });
</script>
</body>
</html>
