<script>
function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
}

// delta标签生成
function dl(v, isBad) {
  if (v === 0) return '<span class="delta zero">+0</span>';
  const prefix = v > 0 ? '+' : '';
  if (isBad && v > 0) return '<span class="delta bad">' + prefix + v + '</span>';
  if (v < 0) return '<span class="delta bad">' + v + '</span>';
  return '<span class="delta pos">' + prefix + v + '</span>';
}
// 百分点delta
function dlPct(v) {
  if (v === 0) return '<span class="delta zero">+0pp</span>';
  const prefix = v > 0 ? '+' : '';
  if (v > 0) return '<span class="delta good">' + prefix + v.toFixed(1) + 'pp</span>';
  return '<span class="delta bad">' + v.toFixed(1) + 'pp</span>';
}

(function buildLY() {
  const colors = ['c1','c2','c3','c4'];
  const teamNames = Object.keys(LY_DATA);
  let totalIz=0,totalIb=0,totalRz=0,totalRb=0,totalSz=0,totalSb=0,people=0;
  let tdIz=0,tdIb=0,tdRz=0,tdRb=0,tdSz=0,tdSb=0;
  teamNames.forEach(t=>{
    const d=LY_DATA[t];
    if(Array.isArray(d)){
      d.forEach(r=>{totalIz+=r.iz;totalIb+=r.ib;totalRz+=r.rz;totalRb+=r.rb;totalSz+=r.sz;totalSb+=r.sb;
        tdIz+=r.diz;tdIb+=r.dib;tdRz+=r.drz;tdRb+=r.drb;tdSz+=r.dsz;tdSb+=r.dsb;people++});
    } else {
      totalIz+=d.iz;totalIb+=d.ib;totalRz+=d.rz;totalRb+=d.rb;totalSz+=d.sz;totalSb+=d.sb;
      tdIz+=d.diz;tdIb+=d.dib;tdRz+=d.drz;tdRb+=d.drb;tdSz+=d.dsz;tdSb+=d.dsb;
    }
  });
  const allZ=totalIz+totalRz+totalSz, allB=totalIb+totalRb+totalSb;
  const allDZ=tdIz+tdRz+tdSz, allDB=tdIb+tdRb+tdSb;
  const allRate=allZ>0?((allZ-allB)/allZ*100).toFixed(2)+'%':'-';
  // 1-5日履约率
  const prevZ=allZ-allDZ, prevB=allB-allDB;
  const prevRate=prevZ>0?((prevZ-prevB)/prevZ*100).toFixed(2):0;
  const rateDelta=allZ>0&&prevZ>0?((allZ-allB)/allZ*100 - (prevZ-prevB)/prevZ*100):-0;

  document.getElementById('sum-ly').innerHTML=`
    <div class="s-card blue"><div class="lb">装维人员</div><div class="vl">${people}<span style="font-size:13px;color:#999">人</span></div></div>
    <div class="s-card gray"><div class="lb">总工单</div><div class="vl">${allZ}${dl(allDZ)}</div></div>
    <div class="s-card red"><div class="lb">不履约</div><div class="vl">${allB}${dl(allDB,true)}</div></div>
    <div class="s-card green"><div class="lb">综合履约率</div><div class="vl">${allRate}${dlPct(rateDelta)}</div></div>
  `;
  const box=document.getElementById('teams-ly');
  function nc(v,dv){return (v>0?`<span class="nc">${v}</span>`:`<span class="ok">0</span>`)+dl(dv,true)}
  function rate(z,b){return z>0?((z-b)/z*100).toFixed(1)+'%':'-'}
  function rateD(z,b,dz,db){
    const pz=z-dz,pb=b-db;
    if(z<=0||pz<=0)return dlPct(0);
    const cur=(z-b)/z*100, prev=(pz-pb)/pz*100;
    return dlPct(cur-prev);
  }
  const ths='<th style="text-align:left;padding-left:12px">姓名</th><th>装机</th><th>装机不履约</th><th>修障</th><th>修障不履约</th><th>支撑</th><th>支撑不履约</th><th>总工单</th><th>总不履约</th><th>履约率</th>';
  teamNames.forEach((tn,ti)=>{
    const d=LY_DATA[tn];const c=colors[ti]||'c1';
    let html=`<div class="team"><div class="team-hd ${c}"><h2>${tn}</h2><div class="ts">`;
    if(Array.isArray(d)){
      let tiz=0,tib=0,trz=0,trb=0,tsz=0,tsb=0;
      let dtiz=0,dtib=0,dtrz=0,dtrb=0,dtsz=0,dtsb=0;
      d.forEach(r=>{tiz+=r.iz;tib+=r.ib;trz+=r.rz;trb+=r.rb;tsz+=r.sz;tsb+=r.sb;
        dtiz+=r.diz;dtib+=r.dib;dtrz+=r.drz;dtrb+=r.drb;dtsz+=r.dsz;dtsb+=r.dsb});
      const tz=tiz+trz+tsz, dtz=dtiz+dtrz+dtsz, dtb=dtib+dtrb+dtsb;
      html+=`工单<b>${tz}</b>${dl(dtz)} | 不履约<b class="${tib+trb+tsb>0?'red':'green'}">${tib+trb+tsb}</b>${dl(dtb,true)} | 履约率<b class="${tib+trb+tsb>0?'red':'green'}">${rate(tz,tib+trb+tsb)}</b>${rateD(tz,tib+trb+tsb,dtz,dtb)}</div></div>`;
      html+=`<table><thead><tr>${ths}</tr></thead><tbody>`;
      d.forEach(r=>{
        const rz=r.iz+r.rz+r.sz,rb=r.ib+r.rb+r.sb;
        const drz=r.diz+r.drz+r.dsz,drb=r.dib+r.drb+r.dsb;
        const rc=rb>0?'warn':'ok';
        html+=`<tr><td class="nm">${r.name}</td><td>${r.iz||'-'}${dl(r.diz)}</td><td>${nc(r.ib,r.dib)}</td><td>${r.rz||'-'}${dl(r.drz)}</td><td>${nc(r.rb,r.drb)}</td><td>${r.sz||'-'}${dl(r.dsz)}</td><td>${nc(r.sb,r.dsb)}</td><td>${rz||'-'}${dl(drz)}</td><td>${nc(rb,drb)}</td><td class="rt ${rc}">${rate(rz,rb)}${rateD(rz,rb,drz,drb)}</td></tr>`;
      });
      html+=`<tr class="sub-row"><td class="nm">小计</td><td>${tiz}${dl(dtiz)}</td><td>${nc(tib,dtib)}</td><td>${trz}${dl(dtrz)}</td><td>${nc(trb,dtrb)}</td><td>${tsz}${dl(dtsz)}</td><td>${nc(tsb,dtsb)}</td><td>${tz}${dl(dtz)}</td><td>${nc(tib+trb+tsb,dtb)}</td><td class="rt ${tib+trb+tsb>0?'warn':'ok'}">${rate(tz,tib+trb+tsb)}${rateD(tz,tib+trb+tsb,dtz,dtb)}</td></tr>`;
      html+=`</tbody></table>`;
    } else {
      const tz=d.iz+d.rz+d.sz,tb=d.ib+d.rb+d.sb;
      const dtz=d.diz+d.drz+d.dsz,dtb=d.dib+d.drb+d.dsb;
      html+=`工单<b>${tz}</b>${dl(dtz)} | 不履约<b class="${tb>0?'red':'green'}">${tb}</b>${dl(dtb,true)} | 履约率<b class="${tb>0?'red':'green'}">${rate(tz,tb)}</b>${rateD(tz,tb,dtz,dtb)}</div></div>`;
      html+=`<table><thead><tr>${ths}</tr></thead><tbody>`;
      html+=`<tr class="support-row"><td class="nm">支撑人员（含综维中心）</td><td>${d.iz||'-'}${dl(d.diz)}</td><td>${nc(d.ib,d.dib)}</td><td>${d.rz||'-'}${dl(d.drz)}</td><td>${nc(d.rb,d.drb)}</td><td>${d.sz||'-'}${dl(d.dsz)}</td><td>${nc(d.sb,d.dsb)}</td><td>${tz}${dl(dtz)}</td><td>${nc(tb,dtb)}</td><td class="rt ${tb>0?'warn':'ok'}">${rate(tz,tb)}${rateD(tz,tb,dtz,dtb)}</td></tr>`;
      html+=`</tbody></table>`;
    }
    html+=`</div>`;box.innerHTML+=html;
  });
})();

function calcPerson(name) {
  const t00 = T00[name] || null;
  const t88 = T88[name] || null;
  const t159 = T159[name] || null;
  let cp00 = t00 ? t00.cp : 0, s1000 = t00 ? t00.s10 : 0, my00 = t00 ? t00.my : 0;
  let cp88 = t88 ? t88.cp : 0, s1088 = t88 ? t88.s10 : 0;
  let cp159 = t159 ? t159.cp : 0, s10159 = t159 ? t159.s10 : 0, my159 = t159 ? t159.my : 0;
  // deltas
  let dcp00 = t00 ? t00.dcp : 0, ds1000 = t00 ? t00.ds10 : 0, dmy00 = t00 ? t00.dmy : 0;
  let dcp88 = t88 ? t88.dcp : 0, ds1088 = t88 ? t88.ds10 : 0;
  let dcp159 = t159 ? t159.dcp : 0, ds10159 = t159 ? t159.ds10 : 0, dmy159 = t159 ? t159.dmy : 0;

  let totalCp = cp00 + cp88 + cp159, totalS10 = s1000 + s1088 + s10159, totalMy = my00 + my159;
  let dtotalCp = dcp00 + dcp88 + dcp159, dtotalS10 = ds1000 + ds1088 + ds10159, dtotalMy = dmy00 + dmy159;
  let combinedRate = totalCp > 0 ? (totalS10 / totalCp * 100).toFixed(2) + '%' : '-';
  // rate delta
  let prevCp = totalCp - dtotalCp, prevS10 = totalS10 - dtotalS10;
  let rateDelta = (totalCp > 0 && prevCp > 0) ? (totalS10/totalCp*100 - prevS10/prevCp*100) : 0;

  return { t00, t88, t159, totalCp, totalS10, combinedRate, totalMy, dtotalCp, dtotalS10, dtotalMy, rateDelta };
}
